<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Employees | Employee Management System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-slate-50">

<div id="sidebar-root"></div>

<div class="lg:pl-64">
  <div id="topbar-root"></div>

  <main class="p-4 sm:p-6 max-w-7xl mx-auto">

    <!-- Toolbar -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-5">
      <div class="relative w-full sm:max-w-xs">
        <svg class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35m1.35-5.15a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="search-input" type="text" placeholder="Search by name, email, department, position..."
          class="w-full pl-9 pr-3 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm bg-white" />
      </div>
      <div class="flex items-center gap-2">
        <select id="sort-select" class="px-3 py-2.5 rounded-lg border border-slate-300 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="created_at:DESC">Newest first</option>
          <option value="created_at:ASC">Oldest first</option>
          <option value="full_name:ASC">Name (A–Z)</option>
          <option value="full_name:DESC">Name (Z–A)</option>
          <option value="salary:DESC">Salary (high–low)</option>
          <option value="salary:ASC">Salary (low–high)</option>
          <option value="department:ASC">Department (A–Z)</option>
        </select>
        <a href="add-employee.html" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2.5 rounded-lg transition shadow-sm shrink-0">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          <span class="hidden sm:inline">Add Employee</span>
        </a>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-slate-500 text-xs uppercase tracking-wide border-b border-slate-100 bg-slate-50/60">
              <th class="px-5 py-3 font-medium">Employee</th>
              <th class="px-5 py-3 font-medium">Department</th>
              <th class="px-5 py-3 font-medium">Position</th>
              <th class="px-5 py-3 font-medium">Salary</th>
              <th class="px-5 py-3 font-medium text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="employees-body">
            <!-- rows injected by JS -->
          </tbody>
        </table>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden text-center py-16 px-4">
        <svg class="w-12 h-12 text-slate-300 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-1.13a4 4 0 100-8 4 4 0 000 8z"/></svg>
        <p class="text-slate-500 font-medium">No employees found</p>
        <p class="text-slate-400 text-sm mt-1">Try adjusting your search or add a new employee.</p>
      </div>

      <!-- Pagination -->
      <div id="pagination-bar" class="flex flex-col sm:flex-row items-center justify-between gap-3 px-5 py-4 border-t border-slate-100">
        <p id="pagination-summary" class="text-xs text-slate-500"></p>
        <div id="pagination-controls" class="flex items-center gap-1"></div>
      </div>
    </div>

  </main>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script src="js/employees.js"></script>
</body>
</html>
