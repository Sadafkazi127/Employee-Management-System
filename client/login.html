<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login | Employee Management System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-gradient min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="bg-white/95 backdrop-blur rounded-2xl shadow-2xl p-8 sm:p-10">
      <div class="flex flex-col items-center mb-8">
        <div class="w-14 h-14 rounded-2xl bg-blue-600 flex items-center justify-center mb-4 shadow-lg shadow-blue-600/30">
          <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-1.13a4 4 0 100-8 4 4 0 000 8z"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-800">Welcome back</h1>
        <p class="text-slate-500 text-sm mt-1">Sign in to your admin dashboard</p>
      </div>

      <form id="login-form" class="space-y-4" novalidate>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
          <input type="email" id="email" name="email" required
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
            placeholder="admin@example.com" />
          <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <div class="relative">
            <input type="password" id="password" name="password" required
              class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm pr-10"
              placeholder="••••••••" />
            <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 px-3 text-slate-400 hover:text-slate-600 text-xs font-medium">Show</button>
          </div>
          <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <button type="submit" id="login-btn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition shadow-lg shadow-blue-600/30 flex items-center justify-center gap-2">
          <span>Sign In</span>
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Don't have an admin account?
        <a href="register.html" class="text-blue-600 font-medium hover:underline">Register</a>
      </p>
    </div>
    <p class="text-center text-blue-100 text-xs mt-6">&copy; 2026 Employee Management System</p>
  </div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
