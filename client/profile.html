<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile | Employee Management System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-slate-50">

<div id="sidebar-root"></div>

<div class="lg:pl-64">
  <div id="topbar-root"></div>

  <main class="p-4 sm:p-6 max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 sm:p-8">
      <div class="flex flex-col items-center text-center mb-6">
        <div id="profile-avatar" class="w-20 h-20 rounded-full bg-blue-600 text-white flex items-center justify-center text-2xl font-semibold mb-4">–</div>
        <h2 id="profile-name" class="text-xl font-semibold text-slate-800">–</h2>
        <p id="profile-email" class="text-slate-500 text-sm mt-0.5">–</p>
      </div>

      <div class="border-t border-slate-100 pt-6 space-y-4">
        <div class="flex justify-between text-sm">
          <span class="text-slate-500">Admin ID</span>
          <span id="profile-id" class="font-medium text-slate-800">–</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-slate-500">Account Created</span>
          <span id="profile-created" class="font-medium text-slate-800">–</span>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
