<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard | Employee Management System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-slate-50">

<div id="sidebar-root"></div>

<div class="lg:pl-64">
  <div id="topbar-root"></div>

  <main class="p-4 sm:p-6 max-w-7xl mx-auto">

    <!-- Stat Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center gap-4">
        <div class="w-12 h-12 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center shrink-0">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-1.13a4 4 0 100-8 4 4 0 000 8z"/></svg>
        </div>
        <div>
          <p class="text-slate-500 text-xs font-medium uppercase tracking-wide">Total Employees</p>
          <p id="stat-total" class="text-2xl font-bold text-slate-800 mt-0.5">–</p>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center gap-4">
        <div class="w-12 h-12 rounded-lg bg-indigo-100 text-indigo-600 flex items-center justify-center shrink-0">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </div>
        <div>
          <p class="text-slate-500 text-xs font-medium uppercase tracking-wide">Male Employees</p>
          <p id="stat-male" class="text-2xl font-bold text-slate-800 mt-0.5">–</p>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center gap-4">
        <div class="w-12 h-12 rounded-lg bg-pink-100 text-pink-600 flex items-center justify-center shrink-0">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </div>
        <div>
          <p class="text-slate-500 text-xs font-medium uppercase tracking-wide">Female Employees</p>
          <p id="stat-female" class="text-2xl font-bold text-slate-800 mt-0.5">–</p>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center gap-4">
        <div class="w-12 h-12 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center shrink-0">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 4h1m4 0h1"/></svg>
        </div>
        <div>
          <p class="text-slate-500 text-xs font-medium uppercase tracking-wide">Departments</p>
          <p id="stat-departments" class="text-2xl font-bold text-slate-800 mt-0.5">–</p>
        </div>
      </div>
    </div>

    <!-- Recently Added Employees -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200">
      <div class="px-5 py-4 border-b border-slate-200 flex items-center justify-between">
        <h2 class="font-semibold text-slate-800">Recently Added Employees</h2>
        <a href="employees.html" class="text-sm text-blue-600 font-medium hover:underline">View all</a>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-slate-500 text-xs uppercase tracking-wide border-b border-slate-100">
              <th class="px-5 py-3 font-medium">Employee</th>
              <th class="px-5 py-3 font-medium">Department</th>
              <th class="px-5 py-3 font-medium">Position</th>
              <th class="px-5 py-3 font-medium">Joined</th>
            </tr>
          </thead>
          <tbody id="recent-employees-body">
            <!-- rows injected by JS -->
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
