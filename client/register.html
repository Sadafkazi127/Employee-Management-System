<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register | Employee Management System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-gradient min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="bg-white/95 backdrop-blur rounded-2xl shadow-2xl p-8 sm:p-10">
      <div class="flex flex-col items-center mb-8">
        <div class="w-14 h-14 rounded-2xl bg-blue-600 flex items-center justify-center mb-4 shadow-lg shadow-blue-600/30">
          <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-4a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-800">Create admin account</h1>
        <p class="text-slate-500 text-sm mt-1">Register to manage your organization</p>
      </div>

      <form id="register-form" class="space-y-4" novalidate>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Full name</label>
          <input type="text" id="name" name="name" required
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
            placeholder="Jane Doe" />
          <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
          <input type="email" id="email" name="email" required
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
            placeholder="admin@example.com" />
          <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required minlength="6"
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
            placeholder="Minimum 6 characters" />
          <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Confirm password</label>
          <input type="password" id="confirm-password" name="confirm-password" required
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
            placeholder="Re-enter your password" />
          <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <button type="submit" id="register-btn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition shadow-lg shadow-blue-600/30">
          Create Account
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Already have an account?
        <a href="login.html" class="text-blue-600 font-medium hover:underline">Sign in</a>
      </p>
    </div>
    <p class="text-center text-blue-100 text-xs mt-6">&copy; 2026 Employee Management System</p>
  </div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
