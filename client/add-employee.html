<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Add Employee | Employee Management System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-slate-50">

<div id="sidebar-root"></div>

<div class="lg:pl-64">
  <div id="topbar-root"></div>

  <main class="p-4 sm:p-6 max-w-4xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 sm:p-8">
      <h2 class="text-lg font-semibold text-slate-800 mb-1">Add New Employee</h2>
      <p class="text-sm text-slate-500 mb-6">Fill in the details below to add a new employee record.</p>

      <form id="employee-form" novalidate>
        <div class="flex items-center gap-4 mb-6">
          <div id="image-preview" class="w-20 h-20 rounded-full bg-slate-100 border-2 border-dashed border-slate-300 flex items-center justify-center text-slate-400 overflow-hidden shrink-0">
            <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 16.5V19a2 2 0 002 2h14a2 2 0 002-2v-2.5M16 5l-4-4m0 0L8 5m4-4v13"/></svg>
          </div>
          <div>
            <label class="inline-block cursor-pointer bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium px-4 py-2 rounded-lg transition">
              Upload Photo
              <input type="file" id="profile_image" accept="image/png, image/jpeg, image/webp" class="hidden" />
            </label>
            <p class="text-xs text-slate-400 mt-1.5">Optional · JPG, PNG or WEBP · Max 2MB</p>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Full Name *</label>
            <input type="text" id="full_name" class="form-input w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="e.g. Aditi Rao" />
            <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email *</label>
            <input type="email" id="email" class="form-input w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="e.g. aditi@example.com" />
            <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Phone Number *</label>
            <input type="tel" id="phone" maxlength="10" class="form-input w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="10-digit number" />
            <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Gender *</label>
            <select id="gender" class="form-input w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
              <option value="">Select gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
            <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Department *</label>
            <input type="text" id="department" class="form-input w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="e.g. Engineering" />
            <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Position *</label>
            <input type="text" id="position" class="form-input w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="e.g. Software Engineer" />
            <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Salary (₹) *</label>
            <input type="number" id="salary" min="0" step="0.01" class="form-input w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="e.g. 65000" />
            <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Date of Joining *</label>
            <input type="date" id="joining_date" class="form-input w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" />
            <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
          </div>

          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">Address</label>
            <textarea id="address" rows="3" class="form-input w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Street, City, State"></textarea>
            <p class="error-text text-red-500 text-xs mt-1 hidden"></p>
          </div>
        </div>

        <div class="flex items-center justify-end gap-3 mt-8 pt-6 border-t border-slate-100">
          <a href="employees.html" class="px-5 py-2.5 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition">Cancel</a>
          <button type="submit" id="submit-btn" class="px-6 py-2.5 rounded-lg text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 transition shadow-sm shadow-blue-600/30">Save Employee</button>
        </div>
      </form>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script src="js/employee-form.js"></script>
</body>
</html>
